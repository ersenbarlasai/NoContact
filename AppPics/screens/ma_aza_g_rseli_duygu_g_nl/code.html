<body class="min-h-screen flex items-center justify-center p-8 font-body-md text-on-background">
<!-- App Store Layout Container -->
<div class="max-w-[1200px] w-full flex flex-col lg:flex-row items-center justify-between gap-16">
<!-- Typography / Marketing Copy Side -->
<div class="flex-1 flex flex-col justify-center max-w-lg">
<h1 class="font-display-lg text-display-lg text-on-surface mb-6 tracking-tight">
                Duygunu fark et
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Ruh halini sakin ve güvenli bir alanda takip et.
            </p>
</div>
<!-- iPhone Mockup Side -->
<div class="relative w-[375px] h-[812px] bg-surface rounded-[48px] iphone-frame overflow-hidden shrink-0 flex flex-col">
<!-- Hardware Notch Mock -->
<div class="absolute top-0 inset-x-0 h-[30px] flex justify-center z-50 pointer-events-none">
<div class="w-[160px] h-full notch relative"></div>
</div>
<!-- Status Bar Mock -->
<div class="h-12 w-full flex justify-between items-end px-6 pb-2 text-[12px] font-semibold text-on-surface relative z-40 pointer-events-none">
<span>9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[16px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_full</span>
</div>
</div>
<!-- APP CONTENT (Journal) -->
<div class="flex-1 overflow-y-auto hide-scrollbar flex flex-col bg-surface relative z-10">
<!-- TopAppBar -->
<header class="bg-surface sticky top-0 z-30 flex justify-between items-center px-margin-mobile w-full h-16">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h2 class="font-headline-md text-headline-md text-primary tracking-tight">Still</h2>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -mr-2 rounded-full">
<span class="material-symbols-outlined" data-icon="eco">eco</span>
</button>
</header>
<main class="px-margin-mobile pb-32 pt-8 flex flex-col gap-section-gap">
<!-- Date & Greeting -->
<section class="flex flex-col gap-2">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Today, 24 Oct</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">How is your internal weather?</h3>
</section>
<!-- Mood Expressors (Tonal Shapes) -->
<section class="flex justify-between items-center px-2">
<!-- Overwhelmed -->
<div class="flex flex-col items-center gap-3">
<button class="w-16 h-16 rounded-[2rem] bg-surface-container-highest border border-outline-variant flex items-center justify-center opacity-50 transition-all">
<div class="w-8 h-8 rounded-full bg-on-surface-variant/20 blur-[2px]"></div>
</button>
</div>
<!-- Heavy -->
<div class="flex flex-col items-center gap-3">
<button class="w-16 h-16 rounded-[2rem] bg-surface-container-highest border border-outline-variant flex items-center justify-center opacity-50 transition-all">
<div class="w-10 h-10 rounded-lg bg-on-surface-variant/40 rotate-12 blur-[1px]"></div>
</button>
</div>
<!-- Calm (Selected) -->
<div class="flex flex-col items-center gap-3">
<button class="w-[72px] h-[72px] rounded-[2rem] bg-primary-container border-2 border-primary-fixed-dim shadow-[0_10px_20px_rgba(83,98,79,0.15)] flex items-center justify-center transition-all scale-105">
<div class="w-12 h-12 rounded-full bg-primary/20 backdrop-blur-sm shadow-inner flex items-center justify-center">
<div class="w-6 h-6 rounded-full bg-primary-fixed-dim opacity-80"></div>
</div>
</button>
</div>
<!-- Light -->
<div class="flex flex-col items-center gap-3">
<button class="w-16 h-16 rounded-[2rem] bg-surface-container-highest border border-outline-variant flex items-center justify-center opacity-50 transition-all">
<div class="w-8 h-8 bg-tertiary-fixed-dim/40 rounded-[10px] rotate-45"></div>
</button>
</div>
</section>
<!-- Journal Input Area -->
<section class="flex flex-col gap-6">
<h4 class="font-support-text text-support-text text-on-surface-variant italic">Reflections</h4>
<div class="bg-surface-bright rounded-2xl p-6 shadow-[0_8px_24px_rgba(83,98,79,0.04)] border border-surface-variant/50">
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none font-body-lg text-body-lg text-on-surface placeholder:text-outline p-0 min-h-[120px]" placeholder="The air feels a bit lighter today. I noticed the way the morning light caught the..."></textarea>
<div class="w-full h-px bg-surface-variant mt-4 mb-4"></div>
<div class="flex justify-between items-center">
<button class="text-outline hover:text-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-weight="fill">add_photo_alternate</span>
</button>
<button class="bg-primary text-on-primary font-label-md text-label-md px-6 py-2.5 rounded-full hover:bg-primary/90 transition-colors">
                                    Save Entry
                                </button>
</div>
</div>
</section>
</main>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full rounded-t-xl bg-surface-container-low/90 backdrop-blur-md shadow-[0_-20px_40px_rgba(83,98,79,0.06)] z-50 flex justify-around items-center px-margin-mobile py-4 max-w-[375px] mx-auto absolute">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1.5 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]" data-icon="home_max">home_max</span>
<span class="font-label-md text-label-md mt-1 hidden">Home</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1.5 scale-90 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-[24px]" data-icon="edit_note" data-weight="fill">edit_note</span>
<span class="font-label-md text-label-md mt-1 hidden">Journal</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1.5 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]" data-icon="auto_graph">auto_graph</span>
<span class="font-label-md text-label-md mt-1 hidden">Path</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1.5 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]" data-icon="settings">settings</span>
<span class="font-label-md text-label-md mt-1 hidden">Settings</span>
</button>
</nav>
</div>
</div>
