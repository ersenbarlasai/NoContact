<body class="bg-primary min-h-screen flex flex-col items-center pt-24 pb-12 px-6 overflow-x-hidden">
<!-- Presentation Canvas: Text Top -->
<header class="text-center max-w-2xl w-full mb-16 px-4 z-10 relative">
<h1 class="font-display-lg text-display-lg text-on-primary mb-6 drop-shadow-sm">
            Dürtü geldiğinde durakla
        </h1>
<p class="font-body-lg text-body-lg text-primary-fixed opacity-90 mx-auto max-w-lg">
            Yazmadan önce nefes al, hatırla ve kendine dön.
        </p>
</header>
<!-- Presentation Canvas: Device Mockup -->
<!-- Outer iPhone Hardware Frame -->
<div class="relative w-[340px] h-[720px] bg-[#1A1A1A] rounded-[56px] p-[10px] shadow-[0_40px_80px_rgba(20,25,20,0.4)] flex-shrink-0 z-10">
<!-- Hardware Buttons (Volume & Power) -->
<div class="absolute -left-[3px] top-[140px] w-[3px] h-[30px] bg-[#333] rounded-l-md"></div>
<div class="absolute -left-[3px] top-[190px] w-[3px] h-[60px] bg-[#333] rounded-l-md"></div>
<div class="absolute -left-[3px] top-[260px] w-[3px] h-[60px] bg-[#333] rounded-l-md"></div>
<div class="absolute -right-[3px] top-[210px] w-[3px] h-[90px] bg-[#333] rounded-r-md"></div>
<!-- Inner App Screen (Bezel & Display) -->
<div class="w-full h-full bg-surface-bright rounded-[46px] overflow-hidden relative flex flex-col">
<!-- Dynamic Island / Notch -->
<div class="absolute top-2 left-1/2 -translate-x-1/2 w-[120px] h-[32px] bg-black rounded-full z-50"></div>
<!-- 
                 APP UI CONTENT: SOS MODE
                 Navigation shell is intentionally suppressed due to 'Task-Focused/Interrupt' page intent.
            -->
<!-- Minimal Close Header -->
<div class="flex justify-between items-center w-full px-margin-mobile pt-14 pb-4">
<div class="w-10"></div> <!-- Spacer for center alignment -->
<span class="font-label-md text-label-md text-on-surface-variant opacity-60 uppercase tracking-widest">
                    Güvenli Alan
                </span>
<button aria-label="Close SOS Mode" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<!-- Main Canvas: Breathing Exercise -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile relative">
<!-- Ambient Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[400px] bg-primary-fixed/20 blur-[80px] rounded-full pointer-events-none"></div>
<!-- Breathing Concentric Rings (Visualizing the "Organic Influence/Soft Focus") -->
<div class="relative flex items-center justify-center w-[280px] h-[280px]">
<!-- Outer Ring -->
<div class="absolute inset-0 bg-primary-fixed/30 rounded-full scale-100 flex items-center justify-center"></div>
<!-- Middle Ring -->
<div class="absolute inset-[30px] bg-primary-fixed/60 rounded-full scale-100 flex items-center justify-center"></div>
<!-- Core Action Circle -->
<div class="absolute inset-[65px] bg-primary-container shadow-[0_10px_40px_rgba(138,154,132,0.3)] rounded-full flex flex-col items-center justify-center text-on-primary-container z-10">
<span class="material-symbols-outlined text-[40px] mb-2" style="font-variation-settings: 'wght' 200;">air</span>
<span class="font-headline-sm text-headline-sm">Nefes Al</span>
</div>
</div>
<!-- Instruction Text -->
<div class="mt-section-gap text-center z-10">
<h2 class="font-headline-md text-headline-md text-on-surface mb-3">Sadece buraya odaklan</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[240px] mx-auto">
                        Kalp atışının yavaşlamasına izin ver. Şu an güvendesin.
                    </p>
</div>
</main>
<!-- Bottom Support Action -->
<div class="mt-auto px-margin-mobile pb-10 w-full z-10">
<button class="w-full bg-surface-container flex items-center gap-4 p-4 rounded-2xl border border-surface-variant/50 shadow-[0_8px_20px_rgba(83,98,79,0.03)] group">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="flex-1 text-left">
<span class="block font-label-md text-label-md text-on-surface">Kendime Notum</span>
<span class="block font-body-sm text-[13px] text-on-surface-variant mt-0.5">Neden yazmamam gerektiğini oku</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>

<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-[120px] h-[5px] bg-on-surface/20 rounded-full"></div>
</div>
