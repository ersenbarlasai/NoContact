</section>

<div class="flex flex-wrap justify-center gap-6 w-full">
<!-- Sakin (Calm) -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-20 h-20 bg-secondary-container rounded-[40%_60%_70%_30%_/_40%_50%_60%_50%] flex items-center justify-center shadow-[0_10px_20px_rgba(83,98,79,0.05)] transition-transform duration-300 group-hover:scale-105 border-2 border-transparent">
<span class="material-symbols-outlined text-on-secondary-container" style="font-size: 32px; font-variation-settings: 'wght' 300;">water_drop</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Sakin</span>
</div>
<!-- Üzgün (Sad) -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-20 h-20 bg-surface-variant rounded-[50%_50%_30%_70%_/_60%_40%_70%_40%] flex items-center justify-center shadow-[0_10px_20px_rgba(83,98,79,0.05)] transition-transform duration-300 group-hover:scale-105 border-2 border-transparent">

</div>

</div>

<div class="w-24 h-24 bg-tertiary-container rounded-[30%_70%_50%_50%_/_50%_30%_70%_50%] flex items-center justify-center shadow-[0_15px_30px_rgba(139,78,61,0.15)] transition-transform duration-300 scale-110 border-2 border-tertiary">

</div>
<span class="font-label-md text-label-md text-tertiary font-bold">Öfkeli</span>
</div>

<div class="w-20 h-20 bg-primary-container rounded-[60%_40%_40%_60%_/_50%_60%_40%_50%] flex items-center justify-center shadow-[0_10px_20px_rgba(83,98,79,0.05)] transition-transform duration-300 group-hover:scale-105 border-2 border-transparent">

</div>
