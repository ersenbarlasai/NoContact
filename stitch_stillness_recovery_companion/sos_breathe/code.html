<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Still - SOS Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@400;500;600&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#cac6bd",
                    "on-secondary": "#ffffff",
                    "primary": "#53624f",
                    "surface-container-low": "#f3f3f4",
                    "secondary": "#605e57",

                    "on-primary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#ffb5a1",
                    "on-tertiary-container": "#501f11",
                    "on-primary-container": "#243221",
                    "inverse-on-surface": "#f0f1f1",
                    "inverse-surface": "#2f3132",
                    "surface-container-highest": "#e2e2e3",
                    "primary-fixed": "#d7e7cf",
                    "surface-variant": "#e2e2e3",
                    "on-surface-variant": "#444841",
                    "on-primary-fixed-variant": "#3c4b38",
                    "surface-tint": "#53624f",
                    "on-secondary-fixed-variant": "#484740",
                    "on-error-container": "#93000a",
                    "surface-container": "#eeeeef",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ffdbd1",
                    "tertiary": "#8b4e3d",
                    "primary-fixed-dim": "#bbcbb3",
                    "secondary-fixed": "#e6e2d8",
                    "on-secondary-fixed": "#1c1c16",
                    "secondary-container": "#e6e2d8",
                    "outline-variant": "#c4c8bf",
                    "surface-dim": "#dadadb",
                    "on-surface": "#1a1c1d",
                    "tertiary-container": "#cb836f",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "background": "#f9f9fa",
                    "inverse-primary": "#bbcbb3",
                    "surface": "#f9f9fa",
                    "surface-bright": "#f9f9fa",
                    "on-tertiary-fixed": "#380d03",
                    "on-background": "#1a1c1d",
                    "error": "#ba1a1a",
                    "primary-container": "#8a9a84",
                    "on-secondary-container": "#66645d",
                    "surface-container-high": "#e8e8e9",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-gap": "48px",
                    "gutter": "16px",
                    "unit": "8px",
                    "margin-desktop": "64px",
                    "margin-mobile": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Literata"],
                    "support-text": ["Literata"],
                    "body-md": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "label-md": ["Manrope"],
                    "display-lg": ["Literata"],
                    "headline-sm": ["Literata"]
            },
            "fontSize": {
                    "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "500"}],

                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600"}],

          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes breath {
            0%, 100% { transform: scale(0.85); opacity: 0.4; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }
        .breathing-circle {
            animation: breath 8s ease-in-out infinite;
        }
        .breathing-inner {
            animation: breath 8s ease-in-out infinite reverse;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<!-- TopAppBar - Suppressed Navigation but Maintained Identity -->
<header class="bg-surface dark:bg-surface-dim sticky top-0 z-50 w-full h-16 max-w-[720px] mx-auto flex justify-between items-center px-margin-mobile">
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<span class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim tracking-tight">Still</span>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="max-w-[720px] mx-auto px-margin-mobile flex flex-col items-center justify-center min-h-[calc(100vh-64px)] pb-24">
<!-- Step Indicator -->
<div class="w-full flex justify-center gap-3 mb-section-gap">
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
<div class="h-1.5 w-12 rounded-full bg-surface-container-highest"></div>
<div class="h-1.5 w-12 rounded-full bg-surface-container-highest"></div>
<div class="h-1.5 w-12 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Crisis Header -->
<div class="text-center mb-12">
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Step 1: Breathe</h1>
<p class="font-body-md text-on-surface-variant max-w-[320px] mx-auto">This moment will pass. Just focus on the movement below.</p>
</div>
<!-- Breathing Component (Central Focal Point) -->
<div class="relative w-80 h-80 flex items-center justify-center mb-12">
<!-- Outer soft glow -->
<div class="breathing-circle absolute inset-0 bg-primary-container/20 rounded-full blur-3xl"></div>
<!-- Medium shell -->
<div class="breathing-circle absolute w-64 h-64 border border-primary-fixed-dim rounded-full opacity-30"></div>
<!-- Main breathing element -->
<div class="breathing-circle w-48 h-48 rounded-full bg-primary-fixed shadow-[0_0_40px_rgba(83,98,79,0.15)] flex items-center justify-center relative overflow-hidden">
<!-- Inner Tonal layering -->
<div class="breathing-inner absolute inset-4 rounded-full bg-primary/10"></div>
<span class="relative z-10 text-primary font-headline-sm italic">Focus</span>
</div>
</div>
<!-- Instructions -->
<div class="text-center mb-section-gap">
<p class="font-headline-sm text-headline-sm text-primary tracking-wide transition-all duration-1000">Inhale peace, exhale the urge.</p>
</div>
<!-- Focus Context Cards (Bento style minimal) -->
<div class="grid grid-cols-1 gap-gutter w-full">
<div class="bg-surface-container-low p-6 rounded-xl flex items-start gap-4">
<div class="p-3 bg-secondary-fixed rounded-full text-on-secondary-fixed">
<span class="material-symbols-outlined" data-icon="timer_3">timer_3</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-1">Grounding Ritual</h3>
<p class="font-body-md text-on-surface">Try to synchronize your breath with the circle for 1 minute.</p>
</div>
</div>
</div>
<!-- Transactional Action -->
<div class="mt-section-gap w-full">
<button class="w-full bg-primary text-on-primary py-5 rounded-full font-label-md text-label-md flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/10">
                I feel calmer
                <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full mt-4 py-4 text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors">
                I need to talk to someone
            </button>
</div>
</main>
<!-- BottomNavBar is suppressed due to Transactional/SOS Mode Focus -->
</body></html>
